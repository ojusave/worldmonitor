# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# World Monitor on Render
# Upstream: https://github.com/koala73/worldmonitor
#
# Deploy: https://render.com/deploy?repo=https://github.com/render-examples/worldmonitor
#
# Config-only Blueprint: no app code changes. Env names and values mirror
# docker-compose.yml (UPSTASH_REDIS_REST_*, WS_RELAY_URL, LOCAL_API_*).
# Render Key Value replaces the compose Redis container; redis-rest and
# ais-relay stay private services on the internal network.
#
# PORT=8080 matches nginx in docker/nginx.conf.
# redis-rest listens on Render's private port 10000; ais-relay on 3004.

previews:
  generation: off

envVarGroups:
  - name: worldmonitor-stack
    envVars:
      - key: LOCAL_API_MODE
        value: docker
      - key: LOCAL_API_CLOUD_FALLBACK
        value: "false"
      - key: SRH_TOKEN
        generateValue: true
      - key: RELAY_SHARED_SECRET
        generateValue: true

projects:
  - name: worldmonitor
    environments:
      - name: production
        services:
          - type: web
            name: worldmonitor
            runtime: docker
            plan: standard
            region: oregon
            dockerfilePath: ./Dockerfile
            dockerContext: .
            healthCheckPath: /api/health
            maxShutdownDelaySeconds: 120
            envVars:
              - fromGroup: worldmonitor-stack
              - key: PORT
                value: "8080"
              - key: LOCAL_API_PORT
                value: "46123"
              - key: UPSTASH_REDIS_REST_URL
                value: http://redis-rest:10000
              - key: UPSTASH_REDIS_REST_TOKEN
                fromService:
                  type: pserv
                  name: redis-rest
                  envVarKey: SRH_TOKEN
              - key: WS_RELAY_URL
                value: http://ais-relay:3004
              - key: GROQ_API_KEY
                sync: false
              - key: OPENROUTER_API_KEY
                sync: false
              - key: FINNHUB_API_KEY
                sync: false
              - key: FRED_API_KEY
                sync: false
              - key: EIA_API_KEY
                sync: false
              - key: AISSTREAM_API_KEY
                sync: false

          - type: pserv
            name: redis-rest
            runtime: docker
            plan: starter
            region: oregon
            dockerfilePath: Dockerfile.redis-rest
            dockerContext: docker
            envVars:
              - fromGroup: worldmonitor-stack
              - key: SRH_CONNECTION_STRING
                fromService:
                  type: keyvalue
                  name: worldmonitor-redis
                  property: connectionString

          - type: pserv
            name: ais-relay
            runtime: docker
            plan: starter
            region: oregon
            dockerfilePath: ./Dockerfile.relay
            dockerContext: .
            envVars:
              - fromGroup: worldmonitor-stack
              - key: PORT
                value: "3004"
              - key: AISSTREAM_API_KEY
                sync: false

          - type: keyvalue
            name: worldmonitor-redis
            plan: starter
            region: oregon
            maxmemoryPolicy: allkeys-lru
            ipAllowList: []
